replicaCount: 1

image:
  repository: ghcr.io/dingp/api-oidc-demo
  pullPolicy: Always
  tag: latest

service:
  type: ClusterIP
  port: 80
  targetPort: 8000

containerPort: 8000

app:
  name: API OIDC Demo
  env: development
  keycloakBaseUrl: https://oidc.lbl-b59.org
  keycloakRealm: amsc
  keycloakClientId: api-oidc-demo
  keycloakBrokerAlias: globus
  keycloakVerifyTls: true
  oidcVerifyAudience: true
  iriProjectsUrl: https://api.iri.nersc.gov/api/v1/account/projects
  iriApiScope: https://auth.globus.org/scopes/ed3e577d-f7f3-4639-b96e-ff5a8445d699/iri_api

resources: {}

nodeSelector: {}

tolerations: []

affinity: {}

imagePullSecrets: []

podAnnotations: {}

podSecurityContext: {}

securityContext:
  capabilities:
    drop:
      - ALL

ingress:
  enabled: false
  name: app
  className: ""
  annotations: {}
  hosts:
    - host: app-oidc-demo.lbl-b59.org
      paths:
        - path: /
          pathType: Prefix
    - host: "{{ .Values.ingress.name }}.{{ .Release.Namespace }}.development.svc.spin.nersc.org"
      paths:
        - path: /
          pathType: Prefix
  tls: []
