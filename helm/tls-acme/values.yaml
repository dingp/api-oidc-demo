# Default values for spin-acme.
# This file is rendered by prepare-values.py using Jinja2.
---
replicaCount: 1

image:
  repository: ghcr.io/dingp/acme
  pullPolicy: Always
  tag: latest

imagePullSecrets: []
nameOverride: ''
fullnameOverride: ''

podAnnotations: {}
podLabels: {}

podSecurityContext:
  fsGroup: 75369 # NERSC GID for the project

securityContext:
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false
  runAsNonRoot: true
  runAsUser: 75369 # NERSC UID

service:
  type: ClusterIP
  port: 8080 # (case 1) port of the existing web server, or 8080 if no pre-existing web server (case 2)

ingress:
  name: app # name of the ingress, which you already have a DNS CNAME record for.
  enabled: true
  className: nginx
  # User-facing domains only. The internal Spin hostname is derived automatically.
  userDomains:
    - app-oidc-demo.lbl-b59.org
  path: /
  pathType: Prefix

email: pding@lbl.gov # email address to be used for the ACME account

cluster: development # NERSC cluster name, development, production, development.svc.spin.nersc.org, or production.svc.spin.nersc.org

useCase: case2 # case1 uses existing web server, case2 creates a new one

webServer:
  webrootPath: '/www'
  # Set from the config file, or derived by prepare-values.py from use_case.
  existing: false # true for case 1; false for case 2 -- use existing deployment and PVC
  deploymentName: existing-websrv # case 2, use this deployment
  claimName: pvc-existing-webroot # case 2, use this PVC

kubeconfig:
  secretName: kubeconfig

cert:
  secretName: tls-cert

cronJob:
  schedule: '5 12  1 */2 *' # every 2 months

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100